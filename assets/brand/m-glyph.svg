<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Freally mark">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9EAFB" />
      <stop offset="50%" stop-color="#89CFF0" />
      <stop offset="100%" stop-color="#3F8FBF" />
    </linearGradient>
    <linearGradient id="topHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55" />
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.10" />
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bottomShade" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16364C" stop-opacity="0" />
      <stop offset="100%" stop-color="#16364C" stop-opacity="0.35" />
    </linearGradient>
    <filter id="dropShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="6" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.45" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#dropShadow)">
    <polygon points="40,40 80,40 128,140 176,40 216,40 216,216 176,216 176,90 144,160 112,160 80,90 80,216 40,216"
             fill="url(#mainGrad)"
             stroke="#2A6A8E"
             stroke-width="2"
             stroke-linejoin="round" />
    <polygon points="40,40 80,40 128,140 176,40 216,40 216,216 176,216 176,90 144,160 112,160 80,90 80,216 40,216"
             fill="url(#topHighlight)" />
    <polygon points="40,40 80,40 128,140 176,40 216,40 216,216 176,216 176,90 144,160 112,160 80,90 80,216 40,216"
             fill="url(#bottomShade)" />
  </g>
</svg>
