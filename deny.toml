# cargo-deny configuration for Mythodikal Anti-Virus.
#
# License posture: source-visible All Rights Reserved (`LICENSE.md`). Third-
# party transitive dependencies must be commercially redistributable as part
# of compiled binaries. Strong copyleft licenses (GPL/AGPL/SSPL) are denied.
#
# See `docs/prd.md` § 13 (Dependencies & Integrations) and `RESEARCH-DOSSIER.md`
# § 3 for the full third-party data and license policy.

[graph]
# Cover all platform targets we ship to.
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Transitive advisories with no actionable fix (all inside the tauri 2.x
# dep tree as of 2026-05-11). Re-audit each release; remove from this
# list as upstream tauri rolls forward.
#   - RUSTSEC-2024-0370: proc-macro-error unmaintained (via tauri-macros)
#   - RUSTSEC-2024-0411..0420 + 2025-0075/0080/0081/0098/0100: gtk-rs
#     GTK3 bindings unmaintained (via tauri-runtime-wry on Linux)
#   - RUSTSEC-2024-0413/0416: unic-* unmaintained (via urlpattern →
#     tauri-utils)
ignore = [
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

[licenses]
# Enumerated allow-list. New licenses require human review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []
# Our own workspace crates inherit license-file = "LICENSE.md" from the
# workspace manifest, but the LICENSE.md text scores below the 0.93
# confidence threshold (it's a custom source-visible license, not an
# SPDX-canonical one). Treating workspace crates as unlicensed is wrong
# in that direction — they're licensed by us, by definition. Skip them
# under `private = { ignore = true }` so the license gate applies only
# to third-party deps.
private = { ignore = true }

# Strong copyleft denied (incompatible with closed binary redistribution).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
# Wildcard deny applies to third-party deps only; workspace path-based
# deps (mythkernel → mythctl / ui-bridge) intentionally have no version
# pin because they're internal.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
